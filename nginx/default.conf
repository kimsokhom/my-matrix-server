server {
    listen 80 default_server;
    server_name _;

    resolver ${DNS_RESOLVER} valid=10s;
    resolver_timeout 5s;

    set $livekit_upstream lk-jwt-service.railway.internal;
    set $mas_upstream mas.railway.internal;
    set $synapse_upstream synapse.railway.internal;
    set $element_upstream element.railway.internal;
    # Variable-based proxy forces nginx to use the resolver for dynamic DNS (prevents 503s on redeploy)
    # HYDRA_HOST = public hostname e.g. hydra-sengly-branch.up.railway.app (no protocol, no port)
    set $hydra_upstream ${HYDRA_HOST};
    # Internal Railway network endpoint for server-to-server Hydra requests (avoids Fastly hairpin 503s)
    set $hydra_internal hydra.railway.internal;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_ssl_server_name on;
    client_max_body_size 50M;

    # DIAGNOSTIC: Health check endpoint
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK - Hydra upstream configured\n";
    }

    # DIAGNOSTIC: Hydra connectivity test
    location = /health/hydra {
        access_log /var/log/nginx/hydra-health.log;
        default_type application/json;
        proxy_pass https://$hydra_upstream/.well-known/openid-configuration;
        proxy_set_header Host $proxy_host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        error_page 502 503 504 = @hydra_error;
    }

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        proxy_pass http://$livekit_upstream:8080/;
    }

    # 2. MAS OIDC Discovery (Element 1.12+ native OIDC / MSC3861 requires MAS's discovery doc, not Hydra's)
    location = /.well-known/openid-configuration {
        access_log /var/log/nginx/mas-oidc.log;
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        error_page 502 503 504 = @mas_error;
    }

    # MAS OAuth2 endpoints - must be exact matches BEFORE the Hydra ^~ /oauth2/ prefix rule.
    # MAS discovery doc advertises all these under /oauth2/ on the nginx domain.
    location = /oauth2/token {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_flags * secure httponly samesite=none;
        error_page 502 503 504 = @mas_error;
    }
    location = /oauth2/userinfo {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        error_page 502 503 504 = @mas_error;
    }
    location = /oauth2/keys.json {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        error_page 502 503 504 = @mas_error;
    }
    location = /oauth2/revoke {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        error_page 502 503 504 = @mas_error;
    }
    location = /oauth2/introspect {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        error_page 502 503 504 = @mas_error;
    }
    location = /oauth2/registration {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        error_page 502 503 504 = @mas_error;
    }
    location = /oauth2/device {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        error_page 502 503 504 = @mas_error;
    }

    # 3. Hydra OAuth2 endpoints (remaining /oauth2/ paths not matched above)
    location ^~ /oauth2/ {
        access_log /var/log/nginx/hydra-oauth.log;
        proxy_pass https://$hydra_upstream;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;

        proxy_pass_header Set-Cookie;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_flags * secure httponly samesite=none;

        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        error_page 502 503 504 = @hydra_error;
    }

    # Error handler for Hydra upstream issues
    location @hydra_error {
        default_type application/json;
        return 502 '{"error":"hydra_upstream_issue","upstream":"${HYDRA_HOST}","message":"Cannot reach Hydra upstream. Check HYDRA_HOST env var."}';
    }

    # Error handler for MAS upstream issues
    location @mas_error {
        default_type application/json;
        return 502 '{"error":"mas_upstream_error","upstream":"mas.railway.internal:8008","message":"MAS service error or unreachable. Check MAS logs."}';
    }

    # 3b. /login - route to MAS (compat-sso continuations, etc.)
    location ^~ /login {
        if ($arg_login_challenge != "") {
            return 307 ${GATEWAY_URL}/api/oauth2/login?$args;
        }

        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;

        proxy_pass_header Set-Cookie;
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_flags * secure httponly samesite=none;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 3c. /consent - Hydra consent challenges must be handled by Gateway.
    location = /consent {
        if ($arg_consent_challenge != "") {
            return 307 ${GATEWAY_URL}/api/oauth2/consent?$args;
        }

        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;

        proxy_pass_header Set-Cookie;
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_flags * secure httponly samesite=none;
    }

    # 4a. /authorize - strip cookies so MAS always redirects to Hydra for fresh auth
    location = /authorize {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie "";
        proxy_pass_header Set-Cookie;
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_flags * secure httponly samesite=none;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 4. MAS endpoints (including /upstream/callback)
    location ~ ^/(authorize|token|userinfo|logout|register|account|consent|graphql|re-authenticate|upstream|compat-sso|complete-compat-sso|assets|assets-mas|_mas) {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;

        proxy_pass_header Set-Cookie;
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_flags * secure httponly samesite=none;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 5. Matrix Auth Delegation -> MAS
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;

        proxy_pass_header Set-Cookie;
        proxy_cookie_path ~*^/.* /;
        proxy_cookie_domain "~^(.*)$" "";
        proxy_cookie_flags * secure httponly samesite=none;
    }

    # 6. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/\.well-known/matrix/) {
        proxy_pass http://$synapse_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Element logout - clears Element Web storage then redirects to IAM login
    location = /element-logout {
        default_type text/html;
        return 200 "<html><head><meta charset='utf-8'></head><body><script>
var next=new URLSearchParams(window.location.search).get('next')||'${GATEWAY_URL}/auth/login';
var keys=Object.keys(localStorage).filter(function(k){return k.startsWith('mx_')||k.startsWith('mx-')||k.startsWith('element_')||k==='riot_'||k.startsWith('matrix_')||k.startsWith('oidc_');});
keys.forEach(function(k){localStorage.removeItem(k);});
sessionStorage.clear();
window.location.replace(next);
</script></body></html>";
    }

    # Element SSO launch - primes storage keys then initiates SSO
    location = /element-launch {
        default_type text/html;
        set $hs_url "https://$host";
        return 200 "<html><head><meta charset='utf-8'></head><body><script>var h='$hs_url';sessionStorage.setItem('mx_web_sso_hs_url',h);localStorage.setItem('mx_web_sso_hs_url',h);localStorage.setItem('mx_hs_url',h);localStorage.setItem('mx_home_server',h);window.location.replace('/_matrix/client/v3/login/sso/redirect?redirectUrl='+encodeURIComponent(h+'/'));</script></body></html>";
    }

    # 7. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://$element_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
