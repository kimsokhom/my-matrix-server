server {
    listen 80 default_server;
    server_name _;

    # Standard Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme; 

    # Fixes internal Railway DNS resolution and forces IPv4
    resolver 127.0.0.11 ipv6=off;
    client_max_body_size 50M;

    # Variables for upstreams to force IPv4 resolution at runtime
    set $lk_jwt "http://lk-jwt-service.railway.internal:8080";
    set $mas "http://mas-test.railway.internal:8008";
    set $synapse "http://synapse-test.railway.internal:8008";
    set $element_web "http://element-web-test.railway.internal:80";

    # 1. MatrixRTC Auth (lk-jwt-service)
    location ^~ /livekit/jwt/ {
        proxy_pass $lk_jwt/; 
    }

    # 2. OIDC Discovery & MAS endpoints (Required for Login)
    location ~ ^/(.well-known/openid-configuration|oauth2|re-authenticate|assets-mas|_mas) {
        proxy_pass $mas;
    }

    # 3. Matrix Auth Delegation -> MAS (Login/Logout)
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass $mas; 
    }

    # 4. API & Discovery -> Synapse
    # NOTE: Manual CORS headers are REMOVED because allow_cors: true is set in homeserver.yaml.
    # Having duplicate CORS headers in Nginx and Synapse causes browsers to block requests.
    location ~ ^(/_matrix|/_synapse|/.well-known/matrix/) {
        proxy_pass $synapse;
    }

    # 5. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass $element_web; 
        
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}