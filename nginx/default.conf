server {
    listen 80 default_server;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https; 

    client_max_body_size 50M;

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        # Check if service is named 'lk-jwt-service' or 'lk-jwt-service-test'
        proxy_pass http://lk-jwt-service.railway.internal:8080/; 
    }

    # 2. MAS Discovery & Endpoints
    location ~ ^/(.well-known/openid-configuration|oauth2|re-authenticate|assets-mas|_mas) {
        # IMPORTANT: Verify if the service name is 'mas' or 'mas-test'
        proxy_pass http://mas-test.railway.internal:8008;
    }

    # 3. Matrix Auth Delegation
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://mas-test.railway.internal:8008; 
    }

    # 4. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/.well-known/matrix/) {
        # IMPORTANT: Verify if the service name is 'synapse' or 'synapse-test'
        proxy_pass http://synapse-test.railway.internal:8008;
    }

    # 5. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://element-web-test.railway.internal:80; 
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}