server {
    listen 80 default_server;
    server_name _;

    # Standard Headers
    # We use $host, $scheme, etc. directly because we are NOT using envsubst anymore
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https; 

    # Fixes internal Railway DNS resolution
    resolver 127.0.0.11 ipv6=off;
    client_max_body_size 50M;

    # 1. MatrixRTC Auth (lk-jwt-service)
    location ^~ /livekit/jwt/ {
        proxy_pass http://lk-jwt-service.railway.internal:8080/; 
    }

    # 2. OIDC Discovery & MAS endpoints (Required for Login)
    location ~ ^/(.well-known/openid-configuration|oauth2|re-authenticate|assets-mas|_mas) {
        proxy_pass http://mas-test.railway.internal:8008;
    }

    # 3. Matrix Auth Delegation -> MAS (Login/Logout)
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://mas-test.railway.internal:8008; 
    }

    # 4. API & Discovery -> Synapse (With CORS Headers)
    location ~ ^(/_matrix|/_synapse|/.well-known/matrix/) {
        proxy_pass http://synapse-test.railway.internal:8008;
        
        # Add CORS headers so Element Web can talk to the API
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

        # Handle Preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 5. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://element-web-test.railway.internal:80; 
        
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}