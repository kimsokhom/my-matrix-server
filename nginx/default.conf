server {
    listen 80 default_server;
    server_name _;

    resolver ${DNS_RESOLVER} valid=10s;
    resolver_timeout 5s;

    set $livekit_upstream lk-jwt-service.railway.internal;
    set $mas_upstream mas.railway.internal;
    set $synapse_upstream synapse.railway.internal;
    set $element_upstream element-web.railway.internal;
    set $hydra_upstream ${HYDRA_UPSTREAM};

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_ssl_server_name on;
    client_max_body_size 50M;

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        proxy_pass http://$livekit_upstream:8080/;
    }

    # 2. Hydra OIDC Discovery
    location ^~ /.well-known/ {
        proxy_pass $hydra_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Hydra OAuth2 endpoints
    location ^~ /oauth2/ {
        proxy_pass $hydra_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_path / "/; SameSite=None; Secure";
        proxy_pass_header Set-Cookie;
    }

    # 4. MAS endpoints
    location ~ ^/(authorize|token|login|logout|register|account|consent|graphql|re-authenticate|upstream|compat-sso|complete-compat-sso|assets|assets-mas|_mas) {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=None; Secure";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 5. Matrix Auth Delegation -> MAS
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://$mas_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_path / "/; SameSite=None; Secure";
        proxy_pass_header Set-Cookie;
    }

    # 6. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/\.well-known/matrix/) {
        proxy_pass http://$synapse_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 7. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://$element_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}