server {
    listen 80 default_server;
    server_name _;

    # Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme; 

    client_max_body_size 50M;

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        # Added / at the end
        proxy_pass ${LK_JWT_INTERNAL_URL}/; 
    }

    # 2. OIDC Discovery & MAS endpoints
    location ~ ^/(.well-known/openid-configuration|oauth2|authorize|token|login|logout|register|account|consent|graphql|re-authenticate|assets|assets-mas|_mas) {
        # Added / at the end
        proxy_pass ${MAS_INTERNAL_URL}/;
    }

    # 3. Matrix Auth Delegation -> MAS
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        # Added / at the end
        proxy_pass ${MAS_INTERNAL_URL}/; 
    }

    # 4. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/.well-known/matrix/) {
        # Added / at the end
        proxy_pass ${SYNAPSE_INTERNAL_URL}/;
    }

    # 5. MAIN FRONTEND -> Element Web
    location / {
        # Added / at the end
        proxy_pass ${ELEMENT_WEB_INTERNAL_URL}/; 
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}