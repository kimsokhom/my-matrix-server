server {
    listen 80 default_server;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;  # ← force https not $scheme
    client_max_body_size 50M;

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        proxy_pass http://lk-jwt-service.railway.internal:8080/;
    }

    # 2. OIDC Discovery & MAS endpoints
    location ~ ^/(\.well-known/openid-configuration|oauth2|authorize|token|login|logout|register|account|consent|graphql|re-authenticate|upstream|compat-sso|complete-compat-sso|assets|assets-mas|_mas) {
        proxy_pass http://mas.railway.internal:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        
        # Critical for CSRF cookies to work across redirects
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=None; Secure";
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 3. Matrix Auth Delegation -> MAS
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://mas.railway.internal:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path / "/; SameSite=None; Secure";
    }

    # 4. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/\.well-known/matrix/) {
        proxy_pass http://synapse.railway.internal:8008;
    }

    # 5. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://element-web.railway.internal:80;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}