server {
    listen 80 default_server;
    server_name _;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 50M;

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        proxy_pass http://lk-jwt-service.railway.internal:8080/;
    }

    # 2. Hydra OAuth2 & OIDC Discovery (must come before MAS block)
    location ^~ /.well-known/ {
        proxy_pass http://hydra.railway.internal:4444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /oauth2/ {
        proxy_pass http://hydra.railway.internal:4444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_path / "/; SameSite=None; Secure";
        proxy_pass_header Set-Cookie;
    }

    # 3. MAS endpoints
    location ~ ^/(authorize|token|login|logout|register|account|consent|graphql|re-authenticate|upstream|compat-sso|complete-compat-sso|assets|assets-mas|_mas) {
        proxy_pass http://mas.railway.internal:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=None; Secure";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 4. Matrix Auth Delegation -> MAS
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://mas.railway.internal:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path / "/; SameSite=None; Secure";
    }

    # 5. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/\.well-known/matrix/) {
        proxy_pass http://synapse.railway.internal:8008;
    }

    # 6. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://element-web.railway.internal:80;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}
```

## Key changes

1. Removed `oauth2` and `.well-known` from the MAS regex — they now go to **Hydra directly**
2. Added dedicated `^~ /oauth2/` and `^~ /.well-known/` blocks pointing to Hydra port `4444`
3. `^~` takes priority over `~` so Hydra locations will always win over MAS regex

## Then update these env vars

**MAS service:**
```
MAS_UPSTREAM_HYDRA_ISSUER=https://nginx-sengly-branch.up.railway.app
```

**Hydra service:**
```
URLS_SELF_ISSUER=https://nginx-sengly-branch.up.railway.app/