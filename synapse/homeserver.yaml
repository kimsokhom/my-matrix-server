server_name: "${SERVER_NAME}"
public_baseurl: "https://${SERVER_NAME}/"
pid_file: /data/homeserver.pid
media_store_path: /data/media_store
signing_key_path: "/data/signing.key"

listeners:
  - port: 8008
    bind_addresses: ["0.0.0.0"]
    type: http
    tls: false
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  allow_unsafe_locale: true
  args:
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
    host: "${POSTGRES_HOST}"
    database: "synapse"
    port: ${POSTGRES_PORT}
    cp_min: 5
    cp_max: 10

suppress_key_server_warning: true
macaroon_secret_key: "${MACAROON_KEY}"
form_secret: "${FORM_SECRET}"
registration_shared_secret: "${REGISTRATION_SHARED_SECRET}"

trusted_third_party_id_servers:
  - "${MAS_URL}"

# Comment out enable_registration entirely to remove the local registration path
# enable_registration: true
# enable_registration_without_verification: true

# Password configuration
password_config:
  enabled: true
  # Set local_authdb_enabled to false to remove username/password login fields.
  # This also effectively disables local registration if enable_registration is true,
  # but explicitly commenting out enable_registration is clearer.
  local_authdb_enabled: false
  # The following settings for password complexity are irrelevant if local_authdb_enabled is false
  # minimum_length: 1
  # require_digit: false
  # require_symbol: false
  # require_uppercase: false
  # require_lowercase: false

serve_server_well_known: true
serve_client_well_known: true
enable_metrics: false
report_stats: false

app_service_config_files:
  - /etc/synapse/registration.yaml

oidc_providers:
  - idp_id: mas
    idp_name: "Matrix Authentication Service"
    discover: true
    issuer: "${MAS_URL}"
    client_id: "${MAS_CLIENT_ID}"
    client_secret: "${MAS_CLIENT_SECRET}"
    scopes: ["openid", "profile"]
    # force_usage: true makes MAS the only *available* authentication method for new registrations/logins.
    force_usage: true
    # Setting allow_existing_users_without_provider to false means even existing local accounts
    # will need to be linked to a MAS account or effectively can't log in directly.
    # If you want existing local users to still be able to log in with their old credentials,
    # set this to true. For MAS-only, set to false.
    allow_existing_users_without_provider: false
