server_name: "${SERVER_NAME}"
public_baseurl: "https://${SERVER_NAME}/"
pid_file: /data/homeserver.pid
media_store_path: /data/media_store
signing_key_path: "/data/signing.key"

listeners:
  - port: 8008
    bind_addresses: ["0.0.0.0"]
    type: http
    tls: false
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  allow_unsafe_locale: true
  args:
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
    host: "${POSTGRES_HOST}"
    database: "synapse"
    port: ${POSTGRES_PORT}
    cp_min: 5
    cp_max: 10

suppress_key_server_warning: true
macaroon_secret_key: "${MACAROON_KEY}"
form_secret: "${FORM_SECRET}"
registration_shared_secret: "${REGISTRATION_SHARED_SECRET}"

# --- NATIVE MAS INTEGRATION (MSC3861) ---
matrix_authentication_service:
  enabled: true
  endpoint: "${MAS_URL}" # URL where Synapse can reach MAS (Railway internal URL is best)
  secret: "${MAS_SHARED_SECRET}" # Must match matrix.secret in MAS config

# Disable Synapse's built-in registration and passwords completely
enable_registration: false

password_config:
  enabled: false
  local_authdb_enabled: false

serve_server_well_known: true
serve_client_well_known: true
enable_metrics: false
report_stats: false

app_service_config_files:
  - /etc/synapse/registration.yaml

