server {
    listen 80 default_server;
    server_name _;

    # Standard Proxy Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme; 

    client_max_body_size 50M;

    # 1. MatrixRTC Auth
    location ^~ /livekit/jwt/ {
        proxy_pass http://lk-jwt-service.railway.internal:8080/; 
    }

    # 2. OIDC Discovery & MAS endpoints (Required for Login & UI)
    location ~ ^/(.well-known/openid-configuration|oauth2|authorize|token|login|logout|register|account|consent|graphql|re-authenticate|assets|assets-mas|_mas) {
        proxy_pass http://mas.railway.internal:8008;
    }

    # 3. Matrix Auth Delegation -> MAS
    location ~ ^/_matrix/client/(api/v1|r0|v3|unstable)/(login|logout|refresh) {
        proxy_pass http://mas.railway.internal:8008; 
    }

    # 4. API & Discovery -> Synapse
    location ~ ^(/_matrix|/_synapse|/.well-known/matrix/) {
        proxy_pass http://synapse.railway.internal:8008;
    }

    # 5. MAIN FRONTEND -> Element Web
    location / {
        proxy_pass http://element-web.railway.internal:80; 
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
}