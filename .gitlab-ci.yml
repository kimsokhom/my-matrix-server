    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
      changes: ["nginx/**"]

build:telegram:
  extends: .build_template
  variables: { SERVICE: telegram }
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["telegram/**"]
    - if: '$CI_COMMIT_BRANCH == "main"'
