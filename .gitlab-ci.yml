# =============================================================================
# Matrix Server Suite — GitLab CI/CD
# =============================================================================
#
# IMAGE TAG STRATEGY:
#   Every push builds ALL services (with Docker layer cache — unchanged
#   services finish in ~10 seconds). This guarantees the commit SHA tag
#   always exists when OpenTofu tries to deploy it.
#
#   Every image gets:
#     :COMMIT_SHA   — what OpenTofu deploys (immutable, unique)
#     :latest       — main branch (human reference)
#     :branch-slug  — feature branch (human reference)
#     :staging-N    — merge request (human reference)
#
# ENVIRONMENTS:
#   feature branch push  →  branch preview  (auto-deploy, auto-cleanup 3 days)
#   merge request open   →  staging-mr-N    (auto-deploy, isolated per MR)
#   merge request close  →  staging-mr-N    destroyed automatically
#   push to main         →  development     (fully automatic)
#
# =============================================================================

stages:
  - build
  - validate
  - plan
  - deploy

default:
  interruptible: true
  retry:
    max: 1
    when: runner_system_failure

variables:
  REGISTRY: "${CI_REGISTRY}/${CI_PROJECT_PATH}"
  TF_ROOT: "${CI_PROJECT_DIR}/terraform"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  PROVIDER_TYPE: "railway"

# =============================================================================
# BUILD — all services on every push, parallel
# Layer cache means unchanged services finish fast (~10s)
# This guarantees the SHA tag always exists before plan/deploy runs
# =============================================================================

.build_template:
  stage: build
  image: docker:25
  services:
    - docker:25-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - |
      echo "=== Building ${SERVICE} ==="

      # Pull previous image for layer cache — if it doesn't exist yet, skip
      docker pull ${REGISTRY}/${SERVICE}:latest || true

      docker build \
        --cache-from ${REGISTRY}/${SERVICE}:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        -t ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA} \
        -f ${SERVICE}/Dockerfile \
        ${SERVICE}/

      # SHA tag — what OpenTofu deploys
      docker push ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA}

      # Context tag — human reference, not used by OpenTofu
      if   [ "$CI_COMMIT_BRANCH" = "main" ];                  then CTX_TAG="latest"
      elif [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then CTX_TAG="staging-${CI_MERGE_REQUEST_IID}"
      elif [ "$CI_PIPELINE_SOURCE" = "push" ];                then CTX_TAG="branch-${CI_COMMIT_REF_SLUG}"
      fi
      if [ -n "${CTX_TAG:-}" ]; then
        docker tag  ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA} ${REGISTRY}/${SERVICE}:${CTX_TAG}
        docker push ${REGISTRY}/${SERVICE}:${CTX_TAG}
        echo "==> SHA tag (deployed by OpenTofu) : ${CI_COMMIT_SHA}"
        echo "==> Context tag (human reference)  : ${CTX_TAG}"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'

build:synapse:
  extends: .build_template
  variables: { SERVICE: synapse }

build:mas:
  extends: .build_template
  variables: { SERVICE: mas }

# TEMPORARY — delete when element-web moves to its own repo
build:element:
  extends: .build_template
  variables: { SERVICE: element }

build:element-call:
  extends: .build_template
  variables: { SERVICE: element-call }

build:nginx:
  extends: .build_template
  variables: { SERVICE: nginx }

build:telegram:
  extends: .build_template
  variables: { SERVICE: telegram }

build:provisioning-service:
  extends: .build_template
  variables: { SERVICE: provisioning-service }

build:postmoogle-widget:
  extends: .build_template
  variables: { SERVICE: postmoogle-widget }

# =============================================================================
# VALIDATE
# =============================================================================

validate:opentofu:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
    - cd ${TF_ROOT}/environments/dev
    - tofu init -backend=false -input=false
  script:
    - cd ${TF_ROOT}
    - tofu fmt -check -recursive
    - cd ${TF_ROOT}/environments/dev
    - tofu validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false
  needs: []

# =============================================================================
# BASE TEMPLATES
# =============================================================================
# TF_HTTP_* env vars are read natively by OpenTofu's HTTP backend for ALL
# operations including state locking — no -backend-config flags needed.

.tofu_base:
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
    - export TF_VAR_provider_type="${PROVIDER_TYPE:-railway}"
    - export TF_VAR_railway_token="${RAILWAY_TOKEN:-}"
    - export TF_VAR_project_id="${RAILWAY_PROJECT_ID:-}"
    - export TF_VAR_aws_region="${AWS_REGION:-ap-southeast-1}"
    - export TF_VAR_project_name="${PROJECT_NAME:-matrix}"
    - export TF_VAR_registry="${REGISTRY}"
    - export TF_VAR_registry_username="${GITLAB_DEPLOY_TOKEN_USERNAME:-$CI_REGISTRY_USER}"
    - export TF_VAR_registry_password="${GITLAB_DEPLOY_TOKEN_PASSWORD:-$CI_REGISTRY_PASSWORD}"
    - |
      if [ -n "${ELEMENT_IMAGE:-}" ]; then
        export TF_VAR_element_image="${ELEMENT_IMAGE}"
      else
        export TF_VAR_element_image="${REGISTRY}/element:${CI_COMMIT_SHA}"
      fi

# Sets TF_HTTP_* so OpenTofu HTTP backend works for init AND state locking
.set_tf_http_vars: &set_tf_http_vars |
  _BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state"
  export TF_HTTP_ADDRESS="${_BASE}/${TF_STATE_KEY}"
  export TF_HTTP_LOCK_ADDRESS="${_BASE}/${TF_STATE_KEY}/lock"
  export TF_HTTP_UNLOCK_ADDRESS="${_BASE}/${TF_STATE_KEY}/lock"
  export TF_HTTP_USERNAME="gitlab-ci-token"
  export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
  export TF_HTTP_LOCK_METHOD="POST"
  export TF_HTTP_UNLOCK_METHOD="DELETE"
  export TF_HTTP_RETRY_WAIT_MIN="5"
  echo "==> Backend state key: ${TF_STATE_KEY}"

# Resolve or create a Railway environment by name
# Sets: RAILWAY_ENV_ID, TF_VAR_environment_id
.resolve_env: &resolve_env |
  if [ "${TF_VAR_provider_type}" = "railway" ]; then
    RAILWAY_ENV_ID=$(curl -sf -X POST "https://backboard.railway.app/graphql/v2" \
      -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
      -H "Content-Type: application/json" \
      -d "$(jq -nc --arg id "$RAILWAY_PROJECT_ID" \
        '{query:"query($id:String!){project(id:$id){environments{edges{node{id name}}}}}",variables:{id:$id}}')" \
      | jq -r ".data.project.environments.edges[] \
          | select(.node.name==\"${RAILWAY_ENV_NAME}\") | .node.id" \
      | head -n1)
    if [ -z "$RAILWAY_ENV_ID" ] || [ "$RAILWAY_ENV_ID" = "null" ]; then
      echo "==> Creating Railway environment: ${RAILWAY_ENV_NAME}"
      RAILWAY_ENV_ID=$(curl -sf -X POST "https://backboard.railway.app/graphql/v2" \
        -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "$(jq -nc --arg p "$RAILWAY_PROJECT_ID" --arg n "$RAILWAY_ENV_NAME" \
          '{query:"mutation($i:EnvironmentCreateInput!){environmentCreate(input:$i){id name}}",variables:{i:{projectId:$p,name:$n}}}')" \
        | jq -r '.data.environmentCreate.id')
      sleep 3
    fi
    echo "==> '${RAILWAY_ENV_NAME}' = ${RAILWAY_ENV_ID}"
    export RAILWAY_ENV_ID
    export TF_VAR_environment_id="${RAILWAY_ENV_ID}"
  else
    export TF_VAR_environment_id="${RAILWAY_ENV_NAME}"
  fi

.delete_env: &delete_env |
  if [ "${TF_VAR_provider_type}" = "railway" ] && [ -n "${RAILWAY_ENV_ID:-}" ]; then
    curl -sf -X POST "https://backboard.railway.app/graphql/v2" \
      -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
      -H "Content-Type: application/json" \
      -d "$(jq -nc --arg id "$RAILWAY_ENV_ID" \
        '{query:"mutation($id:String!){environmentDelete(id:$id)}",variables:{id:$id}}')" \
      > /dev/null && echo "==> Deleted Railway environment: ${RAILWAY_ENV_NAME}"
  fi

.sanitise_branch: &sanitise_branch |
  RAILWAY_ENV_NAME=$(echo "branch-${CI_COMMIT_REF_SLUG}" \
    | tr '[:upper:]' '[:lower:]' \
    | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g' \
    | cut -c1-32)
  [ -z "$RAILWAY_ENV_NAME" ] && RAILWAY_ENV_NAME="branch-${CI_COMMIT_SHORT_SHA}"
  export RAILWAY_ENV_NAME

.all_builds: &all_builds
  - validate:opentofu
  - build:synapse
  - build:mas
  - build:element
  - build:element-call
  - build:nginx
  - build:telegram
  - build:provisioning-service
  - build:postmoogle-widget

# =============================================================================
# PLAN — branch preview
# =============================================================================

plan:branch:
  extends: .tofu_base
  stage: plan
  variables:
    TF_ENV: preview
    TF_STATE_KEY: branch-${CI_COMMIT_REF_SLUG}
  script:
    - *sanitise_branch
    - *resolve_env
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
      export TF_VAR_environment="${RAILWAY_ENV_NAME}"
      tofu plan -out=tfplan
  artifacts:
    paths: [terraform/environments/preview/tfplan]
    expire_in: 2 hours
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
  needs: *all_builds

# =============================================================================
# PLAN — staging
# =============================================================================

plan:staging:
  extends: .tofu_base
  stage: plan
  variables:
    TF_ENV: staging
    TF_STATE_KEY: staging-mr-${CI_MERGE_REQUEST_IID}
  script:
    - |
      RAILWAY_ENV_NAME="staging-mr-${CI_MERGE_REQUEST_IID}"
      export RAILWAY_ENV_NAME
    - *resolve_env
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
      export TF_VAR_environment="staging"
      tofu plan -out=tfplan
  artifacts:
    paths: [terraform/environments/staging/tfplan]
    expire_in: 2 hours
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  needs: *all_builds

# =============================================================================
# PLAN — development
# =============================================================================

plan:dev:
  extends: .tofu_base
  stage: plan
  variables:
    TF_ENV: dev
    TF_STATE_KEY: dev
  script:
    - |
      export RAILWAY_ENV_ID="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_environment_id="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
      export TF_VAR_environment="dev"
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      tofu plan -out=tfplan
  artifacts:
    paths: [terraform/environments/dev/tfplan]
    expire_in: 2 hours
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs: *all_builds

# =============================================================================
# DEPLOY — branch preview
# =============================================================================

deploy:branch:
  extends: .tofu_base
  stage: deploy
  variables:
    TF_ENV: preview
    TF_STATE_KEY: branch-${CI_COMMIT_REF_SLUG}
  script:
    - *sanitise_branch
    - *resolve_env
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
      export TF_VAR_environment="${RAILWAY_ENV_NAME}"
      tofu apply -auto-approve ${CI_PROJECT_DIR}/terraform/environments/${TF_ENV}/tfplan
      sh ${CI_PROJECT_DIR}/scripts/deploy.sh
  environment:
    name: preview/branch-${CI_COMMIT_REF_SLUG}
    url: $RAILWAY_PREVIEW_URL
    on_stop: cleanup:branch
    auto_stop_in: 3 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
  needs: [plan:branch]

cleanup:branch:
  extends: .tofu_base
  stage: deploy
  variables:
    TF_ENV: preview
    TF_STATE_KEY: branch-${CI_COMMIT_REF_SLUG}
  script:
    - *sanitise_branch
    - *resolve_env
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      export TF_VAR_image_tag="branch-${CI_COMMIT_REF_SLUG}"
      export TF_VAR_environment="${RAILWAY_ENV_NAME}"
      tofu destroy -auto-approve
    - *delete_env
  environment:
    name: preview/branch-${CI_COMMIT_REF_SLUG}
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
      when: manual
  allow_failure: true
  needs: []

# =============================================================================
# DEPLOY — staging
# =============================================================================

deploy:staging:
  extends: .tofu_base
  stage: deploy
  variables:
    TF_ENV: staging
    TF_STATE_KEY: staging-mr-${CI_MERGE_REQUEST_IID}
  script:
    - |
      RAILWAY_ENV_NAME="staging-mr-${CI_MERGE_REQUEST_IID}"
      export RAILWAY_ENV_NAME
    - *resolve_env
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
      export TF_VAR_environment="staging"
      tofu apply -auto-approve ${CI_PROJECT_DIR}/terraform/environments/${TF_ENV}/tfplan
      sh ${CI_PROJECT_DIR}/scripts/deploy.sh
  environment:
    name: staging/mr-${CI_MERGE_REQUEST_IID}
    url: $RAILWAY_STAGING_URL
    on_stop: cleanup:staging
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  needs: [plan:staging]

cleanup:staging:
  extends: .tofu_base
  stage: deploy
  variables:
    TF_ENV: staging
    TF_STATE_KEY: staging-mr-${CI_MERGE_REQUEST_IID}
  script:
    - |
      RAILWAY_ENV_NAME="staging-mr-${CI_MERGE_REQUEST_IID}"
      export RAILWAY_ENV_NAME
    - *resolve_env
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      export TF_VAR_image_tag="staging-${CI_MERGE_REQUEST_IID}"
      export TF_VAR_environment="staging"
      tofu destroy -auto-approve
    - *delete_env
  environment:
    name: staging/mr-${CI_MERGE_REQUEST_IID}
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
  allow_failure: true
  needs: []

# =============================================================================
# DEPLOY — development (fully automatic)
# =============================================================================

deploy:dev:
  extends: .tofu_base
  stage: deploy
  variables:
    TF_ENV: dev
    TF_STATE_KEY: dev
  script:
    - |
      export RAILWAY_ENV_ID="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_environment_id="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_environment="dev"
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      tofu apply -auto-approve ${CI_PROJECT_DIR}/terraform/environments/${TF_ENV}/tfplan
      sh ${CI_PROJECT_DIR}/scripts/deploy.sh
  environment:
    name: development
    url: $RAILWAY_DEV_URL
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  needs: [plan:dev]