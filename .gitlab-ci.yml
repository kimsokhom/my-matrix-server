# =============================================================================
# SCAN — Trivy CVE scan per service
# CRITICAL/HIGH blocks the pipeline. Results in GitLab Security dashboard.
# =============================================================================

.scan_template:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - |
      echo "=== Scanning ${SERVICE}:${CI_COMMIT_SHA} ==="
      trivy image \
        --exit-code 1 \
        --severity CRITICAL,HIGH \
        --no-progress \
        --ignore-unfixed \
        "${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA}"
  after_script:
    - |
      trivy image \
        --exit-code 0 \
        --severity CRITICAL,HIGH,MEDIUM \
        --no-progress \
        --ignore-unfixed \
        --format sarif \
        --output "trivy-${SERVICE}.sarif" \
        "${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA}" || true
  artifacts:
    when: always
    paths: ["trivy-${SERVICE}.sarif"]
    reports:
      sast: "trivy-${SERVICE}.sarif"
    expire_in: 1 week

scan:synapse:
  extends: .scan_template
  variables: { SERVICE: synapse }
  needs: [build:synapse]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["synapse/**"]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ["synapse/**"]
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
      changes: ["synapse/**"]

