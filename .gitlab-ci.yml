# =============================================================================
# Matrix Server Suite — GitLab CI/CD
# =============================================================================
#
# IMAGE TAG STRATEGY (no conflicts possible):
#   Every image always gets: registry/service:COMMIT_SHA  (unique, immutable)
#   Plus one human-readable context tag:
#     main branch     → :latest
#     feature branch  → :branch-feature-login
#     merge request   → :staging-3  (MR number)
#
#   OpenTofu deploys using the SHA tag — never the context tag.
#   Two developers pushing simultaneously = different SHAs = zero conflict.
#
# ENVIRONMENTS:
#   feature branch push  →  branch preview  (auto-deploy, auto-cleanup in 3 days)
#   merge request open   →  staging-mr-N    (auto-deploy, isolated per MR)
#   merge request close  →  staging-mr-N    destroyed automatically
#   push to main         →  development     (fully automatic, no manual gate)
#
# MULTIPLE MRS AT THE SAME TIME:
#   MR #3 → env: staging-mr-3, state: staging-mr-3  ─┐ completely
#   MR #7 → env: staging-mr-7, state: staging-mr-7  ─┘ isolated
#
# ELEMENT WEB (temporary — in this repo for now):
#   Built and scanned like any other service.
#   When element-web moves to its own repo:
#     Step 1: Delete build:element and scan:element jobs below
#     Step 2: Set ELEMENT_IMAGE CI variable to the other repo's registry image
#     Step 3: Nothing else changes — terraform already reads ELEMENT_IMAGE
#
# CLOUD PROVIDER:
#   PROVIDER_TYPE = "railway" (default) or "aws"
#   Changing one variable switches the entire deployment target.
#
# =============================================================================

stages:
  - build
  - scan
  - validate
  - plan
  - deploy

default:
  interruptible: true
  retry:
    max: 1
    when: runner_system_failure

variables:
  REGISTRY: "${CI_REGISTRY}/${CI_PROJECT_PATH}/rexform-matrix_server_suite-new"
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  PROVIDER_TYPE: "railway"

# =============================================================================
# SECRET DETECTION — catches accidentally committed secrets on every push
# =============================================================================

include:
  - template: Security/Secret-Detection.gitlab-ci.yml

# =============================================================================
# BUILD
# Each service rebuilds ONLY when its own files change.
# All rebuilds run in parallel.
# =============================================================================

.build_template:
  stage: build
  image: docker:25
  services:
    - docker:25-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - |
      echo "=== Building ${SERVICE} ==="
      docker pull ${REGISTRY}/${SERVICE}:latest || true

      docker build \
        --cache-from ${REGISTRY}/${SERVICE}:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        -t ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA} \
        -f ${SERVICE}/Dockerfile \
        ${SERVICE}/

      # SHA tag — what OpenTofu actually deploys (immutable, unique)
      docker push ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA}

      # Context tag — for humans, NOT used by OpenTofu for deployments
      if   [ "$CI_COMMIT_BRANCH" = "main" ];                  then CTX_TAG="latest"
      elif [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then CTX_TAG="staging-${CI_MERGE_REQUEST_IID}"
      elif [ "$CI_PIPELINE_SOURCE" = "push" ];                then CTX_TAG="branch-${CI_COMMIT_REF_SLUG}"
      fi
      if [ -n "${CTX_TAG:-}" ]; then
        docker tag  ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA} ${REGISTRY}/${SERVICE}:${CTX_TAG}
        docker push ${REGISTRY}/${SERVICE}:${CTX_TAG}
        echo "==> Deployed with SHA tag : ${CI_COMMIT_SHA}"
        echo "==> Human reference tag   : ${CTX_TAG}"
      fi

build:synapse:
  extends: .build_template
  variables: { SERVICE: synapse }
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["synapse/**"]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ["synapse/**"]
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
      changes: ["synapse/**"]

