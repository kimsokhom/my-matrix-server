# =============================================================================
# Matrix Server Suite — GitLab CI/CD
# =============================================================================
#
# HOW IT WORKS:
#
#   Services live in the Railway PROJECT — they're created once via OpenTofu
#   when you first push to main, and persist forever.
#
#   Environments are just different "views" of those services with different
#   image tags and variable sets. Preview environments are created by
#   DUPLICATING the development environment via Railway API.
#
#   push to main    → deploy:dev     (OpenTofu manages services, sets vars)
#   branch push     → deploy:branch  (duplicate dev env, update image + vars)
#   merge request   → deploy:staging (duplicate dev env, update image + vars)
#   MR close        → cleanup:staging (delete env only — services untouched)
#   3 days / manual → cleanup:branch  (delete env only — services untouched)
#
# FIRST TIME SETUP:
#   1. Push to main → deploy:dev creates services and dev environment
#   2. Set RAILWAY_ENVIRONMENT_ID_DEV in GitLab CI/CD variables
#   3. All branch previews will now duplicate from that dev environment
#
# RIGHT NOW (no dev environment yet):
#   Your current branch-new-repo environment (604a4af6) has all services.
#   Rename it to "development" in Railway dashboard and set:
#   RAILWAY_ENVIRONMENT_ID_DEV = 604a4af6-ff8d-4668-a3ec-978b9d95b4a9
#
# =============================================================================

stages:
  - build
  - validate
  - plan
  - deploy

default:
  interruptible: true
  retry:
    max: 1
    when: runner_system_failure

variables:
  REGISTRY: "${CI_REGISTRY}/${CI_PROJECT_PATH}"
  TF_ROOT: "${CI_PROJECT_DIR}/terraform"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  PROVIDER_TYPE: "railway"

# =============================================================================
# BUILD — all services, every push, parallel
# Docker layer cache makes unchanged services finish in ~10s
# =============================================================================

.build_template:
  stage: build
  image: docker:25
  services:
    - docker:25-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - |
      echo "=== Building ${SERVICE} ==="
      docker pull ${REGISTRY}/${SERVICE}:latest || true
      docker build \
        --cache-from ${REGISTRY}/${SERVICE}:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        -t ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA} \
        -f ${SERVICE}/Dockerfile \
        ${SERVICE}/
      docker push ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA}
      if   [ "$CI_COMMIT_BRANCH" = "main" ];                  then CTX_TAG="latest"
      elif [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then CTX_TAG="staging-${CI_MERGE_REQUEST_IID}"
      elif [ "$CI_PIPELINE_SOURCE" = "push" ];                then CTX_TAG="branch-${CI_COMMIT_REF_SLUG}"
      fi
      if [ -n "${CTX_TAG:-}" ]; then
        docker tag  ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHA} ${REGISTRY}/${SERVICE}:${CTX_TAG}
        docker push ${REGISTRY}/${SERVICE}:${CTX_TAG}
        echo "==> SHA tag (deployed): ${CI_COMMIT_SHA}"
        echo "==> Context tag (human reference): ${CTX_TAG}"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'

build:synapse:
  extends: .build_template
  variables: { SERVICE: synapse }

build:mas:
  extends: .build_template
  variables: { SERVICE: mas }

build:element:
  extends: .build_template
  variables: { SERVICE: element }

build:element-call:
  extends: .build_template
  variables: { SERVICE: element-call }

build:nginx:
  extends: .build_template
  variables: { SERVICE: nginx }

build:telegram:
  extends: .build_template
  variables: { SERVICE: telegram }

build:provisioning-service:
  extends: .build_template
  variables: { SERVICE: provisioning-service }

build:postmoogle-widget:
  extends: .build_template
  variables: { SERVICE: postmoogle-widget }

# =============================================================================
# VALIDATE
# =============================================================================

validate:opentofu:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
    - cd ${TF_ROOT}/environments/dev
    - tofu init -backend=false -input=false
  script:
    - cd ${TF_ROOT}
    - tofu fmt -check -recursive
    - cd ${TF_ROOT}/environments/dev
    - tofu validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false
  needs: []

# =============================================================================
# BASE — shared setup (only dev plan/deploy uses OpenTofu)
# =============================================================================

.tofu_base:
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
    - export TF_VAR_provider_type="${PROVIDER_TYPE:-railway}"
    - export TF_VAR_railway_token="${RAILWAY_TOKEN:-}"
    - export TF_VAR_project_id="${RAILWAY_PROJECT_ID:-}"
    - export TF_VAR_registry="${REGISTRY}"
    - export TF_VAR_registry_username="${GITLAB_DEPLOY_TOKEN_USERNAME:-$CI_REGISTRY_USER}"
    - export TF_VAR_registry_password="${GITLAB_DEPLOY_TOKEN_PASSWORD:-$CI_REGISTRY_PASSWORD}"
    - |
      if [ -n "${ELEMENT_IMAGE:-}" ]; then
        export TF_VAR_element_image="${ELEMENT_IMAGE}"
      else
        export TF_VAR_element_image="${REGISTRY}/element:${CI_COMMIT_SHA}"
      fi

# TF_HTTP_* — read natively by OpenTofu for ALL operations including state locking
.set_tf_http_vars: &set_tf_http_vars |
  _BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state"
  export TF_HTTP_ADDRESS="${_BASE}/${TF_STATE_KEY}"
  export TF_HTTP_LOCK_ADDRESS="${_BASE}/${TF_STATE_KEY}/lock"
  export TF_HTTP_UNLOCK_ADDRESS="${_BASE}/${TF_STATE_KEY}/lock"
  export TF_HTTP_USERNAME="gitlab-ci-token"
  export TF_HTTP_PASSWORD="${CI_JOB_TOKEN}"
  export TF_HTTP_LOCK_METHOD="POST"
  export TF_HTTP_UNLOCK_METHOD="DELETE"
  export TF_HTTP_RETRY_WAIT_MIN="5"
  echo "==> State key: ${TF_STATE_KEY}"

.sanitise_branch: &sanitise_branch |
  RAILWAY_ENV_NAME=$(echo "branch-${CI_COMMIT_REF_SLUG}" \
    | tr '[:upper:]' '[:lower:]' \
    | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g' \
    | cut -c1-32)
  [ -z "$RAILWAY_ENV_NAME" ] && RAILWAY_ENV_NAME="branch-${CI_COMMIT_SHORT_SHA}"
  export RAILWAY_ENV_NAME

# Create preview env by duplicating dev (uses sourceEnvironmentId)
# This copies all services + their base config into the new environment
.create_preview_env: &create_preview_env |
  echo "==> Resolving preview environment: ${RAILWAY_ENV_NAME}"
  RAILWAY_ENV_ID=$(curl -sf -X POST "https://backboard.railway.app/graphql/v2" \
    -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
    -H "Content-Type: application/json" \
    -d "$(jq -nc --arg id "$RAILWAY_PROJECT_ID" \
      '{query:"query($id:String!){project(id:$id){environments{edges{node{id name}}}}}",variables:{id:$id}}')" \
    | jq -r ".data.project.environments.edges[] \
        | select(.node.name==\"${RAILWAY_ENV_NAME}\") | .node.id" \
    | head -n1)

  if [ -z "$RAILWAY_ENV_ID" ] || [ "$RAILWAY_ENV_ID" = "null" ]; then
    if [ -z "${RAILWAY_ENVIRONMENT_ID_DEV:-}" ]; then
      echo "ERROR: RAILWAY_ENVIRONMENT_ID_DEV must be set to create preview environments"
      exit 1
    fi
    echo "==> Creating '${RAILWAY_ENV_NAME}' (duplicating dev: ${RAILWAY_ENVIRONMENT_ID_DEV})"
    RAILWAY_ENV_ID=$(curl -sf -X POST "https://backboard.railway.app/graphql/v2" \
      -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
      -H "Content-Type: application/json" \
      -d "$(jq -nc \
        --arg p "$RAILWAY_PROJECT_ID" \
        --arg n "$RAILWAY_ENV_NAME" \
        --arg src "$RAILWAY_ENVIRONMENT_ID_DEV" \
        '{
          query:"mutation($i:EnvironmentCreateInput!){environmentCreate(input:$i){id name}}",
          variables:{i:{projectId:$p,name:$n,sourceEnvironmentId:$src}}
        }')" \
      | jq -r '.data.environmentCreate.id')
    sleep 5
  fi

  echo "==> '${RAILWAY_ENV_NAME}' = ${RAILWAY_ENV_ID}"
  export RAILWAY_ENV_ID

.delete_preview_env: &delete_preview_env |
  if [ -n "${RAILWAY_ENV_ID:-}" ]; then
    echo "==> Deleting environment: ${RAILWAY_ENV_NAME} (${RAILWAY_ENV_ID})"
    curl -sf -X POST "https://backboard.railway.app/graphql/v2" \
      -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
      -H "Content-Type: application/json" \
      -d "$(jq -nc --arg id "$RAILWAY_ENV_ID" \
        '{query:"mutation($id:String!){environmentDelete(id:$id)}",variables:{id:$id}}')" \
      > /dev/null
    echo "==> Deleted (services remain in development)"
  fi

.all_builds: &all_builds
  - validate:opentofu
  - build:synapse
  - build:mas
  - build:element
  - build:element-call
  - build:nginx
  - build:telegram
  - build:provisioning-service
  - build:postmoogle-widget

# =============================================================================
# PLAN — development only
# =============================================================================

plan:dev:
  extends: .tofu_base
  stage: plan
  variables:
    TF_ENV: dev
    TF_STATE_KEY: dev
  script:
    - |
      export TF_VAR_environment_id="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
      export TF_VAR_environment="dev"
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      tofu plan -out=tfplan
  artifacts:
    paths: [terraform/environments/dev/tfplan]
    expire_in: 2 hours
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs: *all_builds

# =============================================================================
# DEPLOY — branch preview
# No OpenTofu. Duplicate dev env via API, update images, set vars.
# =============================================================================

deploy:branch:
  stage: deploy
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
  script:
    - *sanitise_branch
    - *create_preview_env
    - |
      export IMAGE_TAG="${CI_COMMIT_SHA}"
      export DEPLOY_MODE="preview"
      sh ${CI_PROJECT_DIR}/scripts/deploy.sh
  environment:
    name: preview/branch-${CI_COMMIT_REF_SLUG}
    url: $RAILWAY_PREVIEW_URL
    on_stop: cleanup:branch
    auto_stop_in: 3 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
  needs: *all_builds

cleanup:branch:
  stage: deploy
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
  script:
    - *sanitise_branch
    - *create_preview_env
    - *delete_preview_env
  environment:
    name: preview/branch-${CI_COMMIT_REF_SLUG}
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
      when: manual
  allow_failure: true
  needs: []

# =============================================================================
# DEPLOY — staging (MR)
# =============================================================================

deploy:staging:
  stage: deploy
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
  script:
    - |
      RAILWAY_ENV_NAME="staging-mr-${CI_MERGE_REQUEST_IID}"
      export RAILWAY_ENV_NAME
    - *create_preview_env
    - |
      export IMAGE_TAG="${CI_COMMIT_SHA}"
      export DEPLOY_MODE="preview"
      sh ${CI_PROJECT_DIR}/scripts/deploy.sh
  environment:
    name: staging/mr-${CI_MERGE_REQUEST_IID}
    url: $RAILWAY_STAGING_URL
    on_stop: cleanup:staging
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  needs: *all_builds

cleanup:staging:
  stage: deploy
  image:
    name: ghcr.io/opentofu/opentofu:latest
    entrypoint: [""]
  before_script:
    - apk add --no-cache jq curl
  script:
    - |
      RAILWAY_ENV_NAME="staging-mr-${CI_MERGE_REQUEST_IID}"
      export RAILWAY_ENV_NAME
    - *create_preview_env
    - *delete_preview_env
  environment:
    name: staging/mr-${CI_MERGE_REQUEST_IID}
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
  allow_failure: true
  needs: []

# =============================================================================
# DEPLOY — development (OpenTofu manages services)
# =============================================================================

deploy:dev:
  extends: .tofu_base
  stage: deploy
  variables:
    TF_ENV: dev
    TF_STATE_KEY: dev
  script:
    - |
      export RAILWAY_ENV_ID="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_environment_id="${RAILWAY_ENVIRONMENT_ID_DEV:-}"
      export TF_VAR_environment="dev"
      export TF_VAR_image_tag="${CI_COMMIT_SHA}"
    - *set_tf_http_vars
    - |
      cd ${TF_ROOT}/environments/${TF_ENV}
      tofu init -input=false
      tofu apply -auto-approve ${CI_PROJECT_DIR}/terraform/environments/dev/tfplan
      export DEPLOY_MODE="dev"
      sh ${CI_PROJECT_DIR}/scripts/deploy.sh
  environment:
    name: development
    url: $RAILWAY_DEV_URL
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  needs: [plan:dev]
