# Postmoogle Configuration
homeserver: "https://your-synapse-server.com"
login: "@postmoogle:your-server.com"
password: "YourSecurePassword123"

# Encryption key (must be exactly 32 characters)
secret: "12345678901234567890123456789012"

database:
  dialect: "sqlite3"
  dsn: "/data/postmoogle.db"

domains:
  - "your-domain.com"

threads: false

defaults:
  nothread: true

mailbox:
  prefix: ""
  use_localpart: true

logging:
  level: "info"
