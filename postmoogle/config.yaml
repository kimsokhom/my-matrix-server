# Postmoogle Production Configuration
homeserver: "${HOMESERVER_URL}"
login: "${POSTMOOGLE_LOGIN}"
password: "${POSTMOOGLE_PASSWORD}"

# Pickle key for encryption (must be exactly 32 characters)
secret: "${POSTMOOGLE_SECRET}"

database:
  dialect: "sqlite3"
  dsn: "/data/postmoogle.db"

domains:
  - "${POSTMOOGLE_DOMAIN}"

# Disable Matrix-Native Threads globally
threads: false

# DEFAULT ROOM SETTINGS
defaults:
  nothreads: true
  threadify: false
