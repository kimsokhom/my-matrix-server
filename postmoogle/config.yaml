# Postmoogle configuration
homeserver: "${POSTMOOGLE_HOMESERVER}"
login: "${POSTMOOGLE_LOGIN}"
password: "${POSTMOOGLE_PASSWORD}"

database:
  dialect: "${POSTMOOGLE_DB_DIALECT}"
  dsn: "${POSTMOOGLE_DB_DSN}"

domains:
  - "${POSTMOOGLE_DOMAINS}"

# Global threading toggle
threads: false

# DEFAULT ROOM SETTINGS (This is what you need)
defaults:
  threadify: false
  nothreads: true
  # You can also add these to make it even cleaner:
  # nosender: false
  # nosubject: false
