# =============================================================================
# MAUTRIX-TELEGRAM BRIDGE CONFIGURATION (Go bridgev2 version)
# =============================================================================

# -----------------------------------------------------------------------------
# HOMESERVER
# -----------------------------------------------------------------------------
homeserver:
  address: ${SYNAPSE_INTERNAL_URL}
  domain: ${SERVER_NAME}
  software: standard

# -----------------------------------------------------------------------------
# APPSERVICE
# -----------------------------------------------------------------------------
appservice:
  address: ${TELEGRAM_BRIDGE_URL}
  hostname: 0.0.0.0
  port: 29317
  database:
    type: postgres
    uri: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${TELEGRAM_DB_NAME}

  id: telegram
  as_token: ${TELEGRAM_AS_TOKEN}
  hs_token: ${TELEGRAM_HS_TOKEN}

  # Bot identity shown in Matrix
  bot:
    username: telegrambot
    displayname: "Telegram Bot"

# -----------------------------------------------------------------------------
# TELEGRAM API
# Credentials from https://my.telegram.org and @BotFather.
# -----------------------------------------------------------------------------
telegram:
  api_id: ${TELEGRAM_API_ID}
  api_hash: ${TELEGRAM_API_HASH}
  bot_token: ${TELEGRAM_BOT_TOKEN}

# -----------------------------------------------------------------------------
# BRIDGE
# -----------------------------------------------------------------------------
bridge:
  # ---------------------------------------------------------------------------
  # PERMISSIONS
  # relay    - Relay bot only, no login
  # user     - Can log in with own Telegram account
  # admin    - Full bridge control
  # ---------------------------------------------------------------------------
  permissions:
    "*": relay
    "${SERVER_NAME}": user
    "${ADMIN_MXID}": admin

  # ---------------------------------------------------------------------------
  # RELAY MODE
  # ---------------------------------------------------------------------------
  relay:
    enabled: true
    admin_only: false
    prefer_default: true
    allow_bridge: true
    default_relays: []
    message_formats:
      m.text:   "<b>{{ .Sender.DisambiguatedName }}</b>: {{ .Message }}"
      m.notice: "<b>{{ .Sender.DisambiguatedName }}</b>: {{ .Message }}"
      m.emote:  "* <b>{{ .Sender.DisambiguatedName }}</b> {{ .Message }}"
      m.file:   "<b>{{ .Sender.DisambiguatedName }}</b> sent a file{{ if .Caption }}: {{ .Caption }}{{ end }}"
      m.image:  "<b>{{ .Sender.DisambiguatedName }}</b> sent an image{{ if .Caption }}: {{ .Caption }}{{ end }}"
      m.video:  "<b>{{ .Sender.DisambiguatedName }}</b> sent a video{{ if .Caption }}: {{ .Caption }}{{ end }}"
      m.audio:  "<b>{{ .Sender.DisambiguatedName }}</b> sent an audio file{{ if .Caption }}: {{ .Caption }}{{ end }}"

  # ---------------------------------------------------------------------------
  # BACKFILL
  # Disabled to avoid Telegram API spam and reduce ban risk.
  # ---------------------------------------------------------------------------
  backfill:
    enabled: false

  # ---------------------------------------------------------------------------
  # DOUBLE PUPPETING
  # Go bridgev2 uses appservice method — no shared secret needed.
  # ---------------------------------------------------------------------------
  double_puppet:
    servers: {}
    allow_discovery: false
    secrets:
      ${SERVER_NAME}: "as_token:${DOUBLEPUPPET_AS_TOKEN}"

  # ---------------------------------------------------------------------------
  # ENCRYPTION — disabled, bridge does not need E2EE
  # ---------------------------------------------------------------------------
  encryption:
    allow: false
    default: false
    require: false

# -----------------------------------------------------------------------------
# LOGGING (Go zeroconfig format — different from Python)
# Set min_level to debug temporarily when troubleshooting.
# -----------------------------------------------------------------------------
logging:
  min_level: info
  writers:
    - type: stdout
      format: pretty-colored