http:
  public_base: "${MAS_URL}/"
  listeners:
    - name: web
      resources:
        - name: discovery
        - name: human
        - name: oauth
        - name: compat
        - name: graphql
        - name: assets
      binds:
        - address: "0.0.0.0:8008"

database:
  uri: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"

secrets:
  encryption: "${MAS_ENCRYPTION_SECRET}"

matrix:
  homeserver: "${SYNAPSE_URL}"
  secret: "${MAS_SHARED_SECRET}"
  endpoint: "${SYNAPSE_URL}"

clients:
  - client_id: "${MAS_CLIENT_ID}"
    client_auth_method: "client_secret_basic"
    client_secret: "${MAS_CLIENT_SECRET}"
    redirect_uris:
      - "${SYNAPSE_URL}/_synapse/client/oidc/callback"

templates:
  path: /usr/local/share/mas-cli/templates
  assets_manifest: /usr/local/share/mas-cli/manifest.json

branding:
  service_name: "Company Chat"
  logo_uri: "https://example.com/logo.png" # Optional: your logo

# ========== PASSWORD RESET & EMAIL ==========
password_expiry_enabled: false
password_change_expiry: null

# Optional: Configure email for password resets
email:
  from: "noreply@example.com"
  smtp:
    host: "${SMTP_HOST}"
    port: 587
    username: "${SMTP_USER}"
    password: "${SMTP_PASSWORD}"
    use_tls: true
